version: 2
updates:
  # Python (pip) dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "00:00" # UTC 00:00 = JST 09:00
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10

  # Node.js (npm) dependencies (devDependencies in package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "00:00" # UTC 00:00 = JST 09:00
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "00:00" # UTC 00:00 = JST 09:00
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
