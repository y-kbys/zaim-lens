name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
# Cancel in-progress runs when a new push occurs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build:css
          npm run build:licenses

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Update SW and App Cache Version
        run: |
          VERSION="v${{ github.run_number }}"
          sed -i "s/const CACHE_NAME = '.*';/const CACHE_NAME = 'zaim-lens-${VERSION}';/" static/sw.js
          sed -i "s/{{APP_VERSION}}/${VERSION}/" static/index.html
          echo "SW Cache Name updated to: zaim-lens-${VERSION}"
          echo "App Cache Version updated to: ${VERSION}"

      - name: Generate env.yaml
        run: |
          echo '${{ toJson(secrets) }}' | jq -r 'to_entries | .[] | select((.key | ascii_upcase) | IN("WIF_PROVIDER", "WIF_SERVICE_ACCOUNT", "GITHUB_TOKEN") | not) | "\(.key): \(.value | @json)"' > env.yaml
          echo "Generated env.yaml for environment: ${{ github.event.repository.default_branch == github.ref_name && 'prod' || 'dev' }}"
          # Show non-sensitive keys for debugging
          cat env.yaml | sed 's/: .*/: ***/'

      - name: Deploy to Cloud Run
        run: |
          SERVICE_NAME=${{ github.ref == 'refs/heads/main' && 'zaim-lens' || 'zaim-lens-dev' }}
          echo "Deploying to Service: $SERVICE_NAME"
          gcloud run deploy $SERVICE_NAME \
            --source . \
            --region asia-northeast1 \
            --allow-unauthenticated \
            --env-vars-file env.yaml \
            --cpu-boost
