<!-- Global Full-screen Overlay Loading Spinner -->
<div id="loading-overlay"
    class="hidden absolute inset-0 bg-white/90 dark:bg-gray-900/90 z-[2000] flex flex-col items-center justify-center">
    <div
        class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600 dark:border-blue-400 mb-4">
    </div>
    <p id="loading-text" class="text-lg font-bold text-blue-800 dark:text-blue-300 animate-pulse">解析中...</p>
</div>

<!-- Toast Notifications Container -->
<div id="toast-container"
    class="fixed top-6 left-1/2 -translate-x-1/2 z-[500] w-[90%] max-w-sm flex flex-col items-center space-y-3 pointer-events-none">
</div>

<!-- Snackbar for Undo Notification -->
<div id="snackbar-container"
    class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[400] w-[90%] max-w-sm pointer-events-none">
    <div id="snackbar"
        class="hidden opacity-0 translate-y-4 bg-gray-900/95 text-white p-4 rounded-xl shadow-2xl flex items-center justify-between pointer-events-auto transition-all duration-300 backdrop-blur-sm">
        <span id="snackbar-message" class="text-sm font-medium">品目を削除しました</span>
        <button id="btn-undo"
            class="ml-4 text-blue-400 hover:text-blue-300 font-bold text-sm px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors uppercase tracking-wider">
            元に戻す
        </button>
    </div>
</div>
